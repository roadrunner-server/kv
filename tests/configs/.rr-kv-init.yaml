version: '3'

rpc:
  listen: tcp://127.0.0.1:6001

logs:
  level: error
  mode: development

kv:
  default:
    driver: memory
    config: {}

  boltdb-south:
    driver: boltdb
    config:
      file: "rr.db"
      permissions: 0666
      interval: 1

  boltdb-africa:
    driver: boltdb
    config:
      file: "africa.db"
      permissions: 0666
      interval: 1

  memcached:
    driver: memcached
    config:
      addr: [ "127.0.0.1:11211" ]
