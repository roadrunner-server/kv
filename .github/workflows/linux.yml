name: kv

on:
  push:
    branches:
      - master
      - stable
  pull_request:
    branches:
      - master
      - stable

jobs:
  kv_test:
    name: KV plugin (Go ${{ matrix.go }}, OS ${{matrix.os}})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        go: [stable]
        os: ["ubuntu-latest"]
    steps:
      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v6 # action page: <https://github.com/actions/setup-go>
        with:
          go-version: ${{ matrix.go }}

      - name: Check out code
        uses: actions/checkout@v6

      - name: Init Go modules Cache # Docs: <https://git.io/JfAKn#go---modules>
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install Go dependencies
        run: go mod download

      - name: Run golang tests with coverage
        run: |
          cd tests
          mkdir ./coverage-ci

          docker compose -f env/docker-compose-memcached.yaml up -d
          sleep 30
          if [ "$(docker ps -q -f status=running -f name=memcached_1)" ]; then
          echo "KV Docker container started successfully."
             else
                 echo "Failed to start KV Docker container."
                 exit 1
          fi
          go test -timeout 20m -v -race -cover -tags=debug -failfast -coverprofile=./coverage-ci/kv.out -covermode=atomic -coverpkg=github.com/roadrunner-server/kv/v6/... ./...
          docker compose -f env/docker-compose-memcached.yaml down

      - name: Archive code coverage results
        uses: actions/upload-artifact@v7
        with:
          name: coverage-kv
          path: ./tests/coverage-ci/kv.out

  codecov:
    name: Upload codecov
    runs-on: ubuntu-latest
    needs:
      - kv_test
    timeout-minutes: 60
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Download code coverage results
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage
          merge-multiple: true
      - run: |
          echo 'mode: atomic' > summary.txt
          tail -q -n +2 coverage/*.out >> summary.txt
          awk '
            NR == 1 { print; next }
            /^github\.com\/roadrunner-server\/kv\/v6\// {
              sub(/^github\.com\/roadrunner-server\/kv\/v6\//, "", $0)
              print
            }
          ' summary.txt > summary.filtered.txt
          mv summary.filtered.txt summary.txt
      - name: upload to codecov
        uses: codecov/codecov-action@v5
        with:
          files: summary.txt
          fail_ci_if_error: false
